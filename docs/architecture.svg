    <text x="400" y="312" class="m" font-size="13">complexity router</text>
    <text x="400" y="332" class="m" font-size="13">Flash/Gemma → Pro</text>
    <text x="400" y="352" class="m" font-size="13">cost metering · failover</text>
  </g>
  <g>
    <rect x="592" y="248" width="194" height="150" rx="12" fill="#0c1622" stroke="#243240"/>
    <text x="608" y="282" class="h" font-size="15">Telemetry</text>
    <text x="608" y="312" class="m" font-size="13">CUSUM / Wald SPRT</text>
    <text x="608" y="332" class="m" font-size="13">no-peeking detection</text>
    <text x="608" y="352" class="m" font-size="13">incident classify</text>
  </g>
  <g>
    <rect x="800" y="248" width="194" height="150" rx="12" fill="#160e14" stroke="#5a2a3c"/>
    <text x="816" y="282" class="h" font-size="15">Governance</text>
    <text x="816" y="312" class="m" font-size="13">L0/L1 auto</text>
    <text x="816" y="332" class="m" font-size="13">L2 human approval</text>
    <text x="816" y="352" class="m" font-size="13">blast-radius · audit log</text>
  </g>
  <g>
    <rect x="1008" y="248" width="194" height="150" rx="12" fill="#120e22" stroke="#3f3470"/>
    <text x="1024" y="282" class="h" font-size="15">Fleet Immunity</text>
    <text x="1024" y="312" class="m" font-size="13">antibodies</text>
    <text x="1024" y="332" class="m" font-size="13">vaccinate the fleet</text>
    <text x="1024" y="352" class="m" font-size="13">herd response · MTTR≈0</text>
  </g>

  <text x="384" y="432" class="m mono" font-size="13">cloud-mode: real Gemini RCA + ADK + real Cloud Run rollback  ·  default: deterministic demo</text>
  <text x="384" y="454" class="m mono" font-size="13">LLM only picks among known actions → policy sets the risk tier → failure falls back to runbook</text>

  <!-- mission control (right) -->
  <rect x="1272" y="150" width="280" height="250" rx="14" fill="#101824" stroke="#22303f"/>
  <text x="1296" y="186" class="lbl">LIVE NOC</text>
  <text x="1296" y="220" class="h" font-size="20">Mission Control</text>
  <text x="1296" y="252" class="t" font-size="16">Next.js · React Three Fiber</text>
  <text x="1296" y="278" class="m" font-size="14">healing pipeline (3D)</text>
  <text x="1296" y="300" class="m" font-size="14">fleet immunity map</text>
  <text x="1296" y="322" class="m" font-size="14">governance approval modal</text>
  <text x="1296" y="362" class="m mono" font-size="13">demo + live mode</text>

  <!-- arrows AI<->operator -->
  <line x1="300" y1="232" x2="356" y2="232" stroke="#4fd6ff" stroke-width="2" marker-end="url(#arr)"/>
  <text x="306" y="222" class="m" font-size="12">metrics · traces · GitHub deploys</text>
  <line x1="356" y1="320" x2="300" y2="320" stroke="#57e0a0" stroke-width="2.5" marker-end="url(#arrG)"/>
  <text x="300" y="346" class="t" font-size="12" font-weight="700" fill="#57e0a0">remediation · REAL Cloud Run rollback</text>

  <!-- arrow operator->mission control -->
  <line x1="1212" y1="232" x2="1268" y2="232" stroke="#4fd6ff" stroke-width="2" marker-end="url(#arr)"/>
  <text x="1216" y="222" class="m" font-size="12">control-plane API · SSE/JSON</text>

