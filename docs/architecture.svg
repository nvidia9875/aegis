<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 940" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e16"/>
      <stop offset="1" stop-color="#070a11"/>
    </linearGradient>
    <linearGradient id="op" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#121b29"/>
      <stop offset="1" stop-color="#0d1420"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4fd6ff"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#57e0a0"/>
    </marker>
    <style>
      .h{fill:#e8eef6;font-weight:700}
      .t{fill:#cdd9e6}
      .m{fill:#8aa0b3}
      .lbl{fill:#6f8498;font-size:13px;letter-spacing:.06em}
      .tag{fill:#0a0e16;font-weight:700}
      .mono{font-family:'SFMono-Regular',Consolas,monospace}
    </style>
  </defs>

  <rect width="1600" height="940" fill="url(#bg)"/>

  <!-- title -->
  <text x="48" y="58" class="h" font-size="34">AEGIS</text>
  <text x="172" y="58" class="m" font-size="19">— the Autonomous SRE for AI services</text>
  <text x="49" y="84" class="lbl mono">DETECT · PERCEIVE · RECALL · REASON · ACT · VERIFY · REFLECT · IMMUNIZE</text>

  <!-- AI services (left) -->
  <rect x="48" y="150" width="252" height="250" rx="14" fill="#101824" stroke="#22303f"/>
  <text x="72" y="186" class="lbl">GUARDED TARGET</text>
  <text x="72" y="220" class="h" font-size="20">AI Service(s)</text>
  <text x="72" y="252" class="t" font-size="16">RAG chat API</text>
  <text x="72" y="278" class="t" font-size="16">+ OpenTelemetry</text>
  <text x="72" y="318" class="m" font-size="14">groundedness · cost · latency</text>
  <text x="72" y="340" class="m" font-size="14">hallucination · PII · errors</text>
  <text x="72" y="378" class="m mono" font-size="13">Cloud Run revisions</text>

  <!-- operator (center) -->
  <rect x="360" y="120" width="852" height="438" rx="16" fill="url(#op)" stroke="#2a3b4f"/>
  <text x="384" y="156" class="h" font-size="19">AEGIS OPERATOR</text>
  <text x="556" y="156" class="m" font-size="15">autonomous self-heal loop · ADK + Gemini</text>

  <!-- pipeline pills -->
  <g font-size="13" text-anchor="middle">
    <!-- 8 pills from x=384 width=86 gap=14 -->
    <g>
      <rect x="384" y="180" width="86" height="40" rx="9" fill="#0e1a16" stroke="#2f5d49"/>
      <text x="427" y="205" class="t">Detect</text>
    </g>
    <g>
      <rect x="484" y="180" width="86" height="40" rx="9" fill="#0e1a16" stroke="#2f5d49"/>
      <text x="527" y="205" class="t">Perceive</text>
    </g>
    <g>
      <rect x="584" y="180" width="86" height="40" rx="9" fill="#161226" stroke="#473b78"/>
      <text x="627" y="205" class="t">Recall</text>
    </g>
    <g>
      <rect x="684" y="180" width="86" height="40" rx="9" fill="#101d2b" stroke="#2c5a72"/>
      <text x="727" y="205" class="t">Reason</text>
    </g>
    <g>
      <rect x="784" y="180" width="86" height="40" rx="9" fill="#231018" stroke="#7a3047"/>
      <text x="827" y="205" class="t">Act</text>
    </g>
    <g>
      <rect x="884" y="180" width="86" height="40" rx="9" fill="#0e1a16" stroke="#2f5d49"/>
      <text x="927" y="205" class="t">Verify</text>
    </g>
    <g>
      <rect x="984" y="180" width="86" height="40" rx="9" fill="#101d2b" stroke="#2c5a72"/>
      <text x="1027" y="205" class="t">Reflect</text>
    </g>
    <g>
      <rect x="1084" y="180" width="100" height="40" rx="9" fill="#161226" stroke="#5b4aa0"/>
      <text x="1134" y="205" class="t">Immunize</text>
    </g>
