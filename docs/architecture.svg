  <text x="72" y="636" class="lbl">GOOGLE CLOUD</text>
  <g font-size="14" text-anchor="middle">
    <g><rect x="240" y="620" width="150" height="46" rx="10" fill="#10202c" stroke="#2c4f63"/><text x="315" y="648" class="t">Cloud Run</text></g>
    <g><rect x="404" y="620" width="160" height="46" rx="10" fill="#10202c" stroke="#2c4f63"/><text x="484" y="648" class="t">Gemini + ADK</text></g>
    <g><rect x="578" y="620" width="210" height="46" rx="10" fill="#10202c" stroke="#2c4f63"/><text x="683" y="648" class="t">Vertex Gen AI Eval</text></g>
    <g><rect x="802" y="620" width="246" height="46" rx="10" fill="#0e1a24" stroke="#243240"/><text x="925" y="648" class="m">Monitoring · Logging · Trace</text></g>
    <g><rect x="1062" y="620" width="110" height="46" rx="10" fill="#0e1a24" stroke="#243240"/><text x="1117" y="648" class="m">Pub/Sub</text></g>
    <g><rect x="1186" y="620" width="120" height="46" rx="10" fill="#0e1a24" stroke="#243240"/><text x="1246" y="648" class="m">BigQuery</text></g>
    <g><rect x="1320" y="620" width="120" height="46" rx="10" fill="#0e1a24" stroke="#243240"/><text x="1380" y="648" class="m">Firestore</text></g>
  </g>

  <!-- three pillars -->
  <g>
    <rect x="48" y="724" width="490" height="120" rx="14" fill="#0e1a16" stroke="#2f5d49"/>
    <text x="72" y="760" class="h" font-size="17">① AI-for-AIOps</text>
    <text x="72" y="790" class="m" font-size="14">heals the AI-specific failures classic</text>
    <text x="72" y="812" class="m" font-size="14">monitoring can't even see</text>
  </g>
  <g>
    <rect x="555" y="724" width="490" height="120" rx="14" fill="#120e22" stroke="#3f3470"/>
    <text x="579" y="760" class="h" font-size="17">② Fleet Immunity</text>
    <text x="579" y="790" class="m" font-size="14">one incident vaccinates the whole</text>
    <text x="579" y="812" class="m" font-size="14">fleet — compounding moat</text>
  </g>
  <g>
    <rect x="1062" y="724" width="490" height="120" rx="14" fill="#160e14" stroke="#5a2a3c"/>
    <text x="1086" y="760" class="h" font-size="17">③ Governance</text>
    <text x="1086" y="790" class="m" font-size="14">irreversible ops gated on a human —</text>
    <text x="1086" y="812" class="m" font-size="14">autonomy you can put in production</text>
  </g>

  <text x="48" y="892" class="m mono" font-size="12">Demo mode: FakeProvider + SimulatedService (deterministic, no GCP).  Cloud mode: real Gemini/ADK + real Cloud Run rollback.  backend: 96 passed/1 skipped · 92% cov · bench PASS.</text>
</svg>
