  <!-- connector under pills -->
  <line x1="470" y1="200" x2="484" y2="200" stroke="#3a4d61" marker-end="url(#arr)"/>
  <line x1="570" y1="200" x2="584" y2="200" stroke="#3a4d61" marker-end="url(#arr)"/>
  <line x1="670" y1="200" x2="684" y2="200" stroke="#3a4d61" marker-end="url(#arr)"/>
  <line x1="770" y1="200" x2="784" y2="200" stroke="#3a4d61" marker-end="url(#arr)"/>
  <line x1="870" y1="200" x2="884" y2="200" stroke="#3a4d61" marker-end="url(#arr)"/>
  <line x1="970" y1="200" x2="984" y2="200" stroke="#3a4d61" marker-end="url(#arr)"/>
  <line x1="1070" y1="200" x2="1084" y2="200" stroke="#3a4d61" marker-end="url(#arr)"/>

